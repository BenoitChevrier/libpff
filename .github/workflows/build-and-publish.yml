# ============================================================
# GitHub Actions — Build & Publish libpff-python
# Windows + Linux + macOS
# ============================================================

name: Build & Publish libpff-python Windows Wheel

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:

  # ──────────────────────────────────────────────
  # JOB 1 : Build des wheels Windows
  # ──────────────────────────────────────────────
  build_windows:
    name: Windows — Python ${{ matrix.python-version }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64

      - name: Sync internal C libraries
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          Write-Host "==> Syncing libyal sub-libraries..."
          .\synclibs.ps1 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "synclibs.ps1 failed with exit code $LASTEXITCODE"
            exit 1
          }

      - name: Sync zlib
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          Write-Host "==> Downloading zlib 1.3.2..."
          Invoke-WebRequest -Uri "https://zlib.net/zlib132.zip" -OutFile "zlib132.zip"
          Expand-Archive -Path "zlib132.zip" -DestinationPath "." -Force
          if (Test-Path "zlib-1.3.2") {
            Move-Item "zlib-1.3.2" "..\zlib" -Force
            Write-Host "==> zlib ready at ..\zlib"
          }
          Remove-Item "zlib132.zip" -Force

      - name: Generate VS project files
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          Write-Host "==> Generating Visual Studio project files..."
          if (-Not (Test-Path "..\vstools")) {
            git clone https://github.com/libyal/vstools.git ..\vstools 2>&1
          }
          .\autogen.ps1 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "autogen.ps1 failed with exit code $LASTEXITCODE"
            exit 1
          }

      - name: Build with MSBuild
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          $PythonExe = (Get-Command python).Source
          $PythonPath = Split-Path $PythonExe -Parent
          Write-Host "==> Python path: $PythonPath"

          .\build.ps1 `
            -VisualStudioVersion 2022 `
            -Configuration Release `
            -Platform x64 `
            -PythonPath $PythonPath `
            -VSToolsPath "..\vstools" `
            -VSToolsOptions "--extend-with-x64 --no-python-dll" 2>&1

          if ($LASTEXITCODE -ne 0) {
            Write-Error "build.ps1 failed with exit code $LASTEXITCODE"
            exit 1
          }

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools>=77.0.0" wheel build twine delvewheel

      - name: Build wheel
        shell: powershell
        run: |
          Write-Host "==> Building wheel..."
          python setup.py bdist_wheel
          Get-ChildItem dist\*.whl | ForEach-Object { Write-Host "Produced: $_" }

      - name: Check wheel
        shell: powershell
        run: |
          Write-Host "==> Wheel produced:"
          Get-ChildItem dist\*.whl

      - name: Test wheel
        shell: powershell
        run: |
          Write-Host "==> Testing wheel..."
          $wheel = Get-ChildItem dist\*.whl | Select-Object -First 1
          pip install $wheel.FullName
          python -c "import pypff; print('pypff version:', pypff.get_version()); print('OK')"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-win-py${{ matrix.python-version }}
          path: dist/*.whl
          retention-days: 7

  # ──────────────────────────────────────────────
  # JOB 2 : Build Linux + macOS
  # ──────────────────────────────────────────────
  build_unix:
    name: ${{ matrix.os }} — Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y git autoconf automake autopoint libtool pkg-config

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install autoconf automake gettext libtool pkg-config gnu-sed
          echo "/usr/local/opt/gettext/bin" >> $GITHUB_PATH

      - name: Sync libs and autogen
        run: ./synclibs.sh && ./autogen.sh

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools>=77.0.0" wheel build auditwheel

      - name: Configure and build
        run: |
          ./configure --enable-python --with-pyprefix --disable-shared-libs
          make

      - name: Build wheel
        run: python setup.py bdist_wheel

      - name: Skip repair — keep linux wheel as-is
        if: runner.os == 'Linux'
        run: |
          echo "Skipping auditwheel repair — wheel targets Ubuntu 24.04+"

      - name: Test wheel
        run: |
          pip install $(ls dist/*.whl | head -1)
          python -c "import pypff; print('pypff version:', pypff.get_version()); print('OK')"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl
          retention-days: 7

  # ──────────────────────────────────────────────
  # JOB 3 : Publish sur PyPI
  # Attend que build_windows ET build_unix soient terminés
